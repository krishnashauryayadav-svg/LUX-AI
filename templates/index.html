<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚡ Lux.AI OS Universal Interface</title>
    <style>
        body { background: #0a0a12; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { background: #121225; border-radius: 15px; padding: 30px; width: 850px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        h1 { margin-top: 0; color: #00ffcc; letter-spacing: 2px; font-size: 28px; }
        textarea { width: 100%; height: 80px; background: #1a1a35; border: 2px solid #333; border-radius: 8px; color: #fff; padding: 12px; font-size: 14px; resize: none; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        textarea:focus { border-color: #00ffcc; }
        button { background: linear-gradient(45deg, #00ffcc, #0077ff); border: none; border-radius: 25px; color: white; padding: 12px 40px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,255,204,0.3); }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(0,255,204,0.5); }
        .output-panel { width: 100%; margin-top: 25px; display: flex; gap: 20px; }
        .box { flex: 1; height: 250px; background: #050510; border-radius: 8px; border: 1px solid #222; padding: 15px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; box-sizing: border-box; }
        .box h3 { margin-top: 0; color: #ff007f; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .log-text { color: #00ff66; line-height: 1.5; } .out-text { color: #00ffff; line-height: 1.5; }
        
        /* 🔮 उड़ता हुआ एनिमेटेड बुलबुला (Floating Web Bubble) */
        .bubble-wrapper { position: absolute; top: -60px; right: -60px; width: 140px; height: 140px; pointer-events: none; }
        .bubble { width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, rgba(0, 255, 204, 0.8), rgba(0, 119, 255, 0.4) 40%, rgba(255, 0, 127, 0.1) 70%); border-radius: 50%; box-shadow: inset 0 0 20px rgba(255,255,255,0.6), 0 0 30px rgba(0,255,204,0.3); animation: float 4s ease-in-out infinite, pulse 2s infinite alternate; transition: 0.5s; }
        @keyframes float { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); border-radius: 42% 58% 50% 50% / 50% 58% 42% 50%; } 100% { transform: translateY(0px) rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 30px rgba(0,255,204,0.3); } 100% { box-shadow: 0 0 50px rgba(255,0,127,0.6); } }
        .bubble.busy { animation: spin 0.4s linear infinite !important; background: radial-gradient(circle, #ff007f, #00ffcc); }
        @keyframes spin { 100% { transform: rotate(360deg) scale(1.15); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="bubble-wrapper"><div id="luxBubble" class="bubble"></div></div>
        
        <h1>⚡ LUX.AI UNIVERSAL WORKSPACE</h1>
        <textarea id="promptInput" placeholder="अपनी समस्या या प्रोजेक्ट का विवरण यहाँ लिखें... (उदा: Create a simple list and print cubes)"></textarea>
        <button onclick="startMission()">🚀 बुलबुला उड़ाओ (Run Engine)</button>
        
        <div class="output-panel">
            <div class="box">
                <h3>📟 Live Agent Logs</h3>
                <div id="logArea" class="log-text"></div>
            </div>
            <div class="box">
                <h3>💻 Sandbox Output</h3>
                <div id="outputArea" class="out-text"></div>
            </div>
        </div>
    </div>

    <script>
        function startMission() {
            let prompt = document.getElementById("promptInput").value.trim();
            if(!prompt) { alert("पहले कुछ लिखो तो भाई!"); return; }
            
            let bubble = document.getElementById("luxBubble");
            let logArea = document.getElementById("logArea");
            let outputArea = document.getElementById("outputArea");
            
            bubble.classList.add("busy");
            logArea.innerHTML = "🚀 इंजन स्टार्ट हो गया है...<br>⏳ क्लाउड मॉडल (Qwen-32B) से कोड मांगा जा रहा है...<br>";
            outputArea.innerHTML = "प्रतीक्षा की जा रही है...";
            
            fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            })
            .then(res => res.json())
            .then(data => {
                bubble.classList.remove("busy");
                logArea.innerHTML = data.logs.join("<br>");
                if(data.output) {
                    outputArea.innerHTML = `📂 <b>प्रोजेक्ट फ़ोल्डर लॉक है:</b><br>${data.folder}<br><br>🏁 <b>अंतिम आउटपुट:</b><br>${data.output}`;
                } else {
                    outputArea.innerHTML = "❌ कोड निष्पादन फेल हुआ।";
                }
            })
            .catch(err => {
                bubble.classList.remove("busy");
                logArea.innerHTML += "<br>❌ नेटवर्क या सर्वर एरर आया!";
            });
        }
    </script>
</body>
</html>
